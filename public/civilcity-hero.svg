<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Premium civil infrastructure at golden hour</title>
  <desc id="desc">A cinematic civil engineering scene with a coastal road, bridge works, contour lines and amber sunset light.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b210b"/>
      <stop offset="0.38" stop-color="#140b00"/>
      <stop offset="1" stop-color="#0b0600"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb442" stop-opacity=".08"/>
      <stop offset=".55" stop-color="#ffb442" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fff1e0" stop-opacity=".26"/>
    </linearGradient>
    <radialGradient id="sun" cx=".78" cy=".24" r=".42">
