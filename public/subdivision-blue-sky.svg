<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Sunshine Coast subdivision development under blue sky</title>
  <desc id="desc">A cinematic subdivision development with blue sky, coastal hills, roads, lots and civil works.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ea7e6"/>
      <stop offset=".48" stop-color="#9ccdec"/>
      <stop offset=".86" stop-color="#e5b45f"/>
      <stop offset="1" stop-color="#6d4a22"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53683d"/>
      <stop offset=".45" stop-color="#7d8b55"/>
      <stop offset="1" stop-color="#3c2b18"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#140b00" stop-opacity=".72"/>
      <stop offset=".46" stop-color="#140b00" stop-opacity=".38"/>
      <stop offset="1" stop-color="#140b00" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="bottomScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#140b00" stop-opacity="0"/>
      <stop offset=".68" stop-color="#140b00" stop-opacity=".78"/>
      <stop offset="1" stop-color="#0b0600" stop-opacity=".96"/>
    </linearGradient>
    <radialGradient id="sun" cx=".78" cy=".2" r=".32">
      <stop offset="0" stop-color="#fff1e0" stop-opacity=".78"/>
      <stop offset=".32" stop-color="#ffb442" stop-opacity=".32"/>
      <stop offset="1" stop-color="#ffb442" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .055"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1800" height="1200" fill="url(#sky)"/>
  <rect width="1800" height="1200" fill="url(#sun)"/>
  <g opacity=".55" filter="url(#soft)">
    <ellipse cx="1300" cy="250" rx="470" ry="82" fill="#ffffff"/>
    <ellipse cx="480" cy="290" rx="390" ry="64" fill="#ffffff"/>
  </g>
